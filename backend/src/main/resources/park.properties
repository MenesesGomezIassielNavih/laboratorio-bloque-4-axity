# --- Parametros generales de la simulacion ---
simulation.steps=20
simulation.initialTourists=15
simulation.initialDinosaurs=8
simulation.initialEnergy=100
simulation.maxEvents=2

# --- Precios y costos del parque ---
ticket.priceAdult=350.00
ticket.priceChild=180.00
souvenir.avgPrice=120.00

# --- Sistema de monitoreo ---
monitoring.intervalSteps=10

# --- Configuracion de eventos ---
dealsHour.discount=0.30
vehicleFailure.repairSteps=3

# --- Vehiculos del parque ---
vehicles.initialCount=3

# --- Base de datos H2 (modo file con AUTO_SERVER para inspeccion concurrente) ---
db.url=jdbc:h2:file:./data/parkdb;AUTO_SERVER=TRUE
db.user=sa
db.password=
